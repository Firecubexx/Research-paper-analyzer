<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uttam Research Intelligence Hub</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.10.377/pdf.min.js"></script>

    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --bg: #0f2027;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 1000px;
            width: 100%;
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            text-align: center;
        }

        h1 { font-weight: 300; letter-spacing: 2px; margin-bottom: 10px; text-transform: uppercase; }
        .subtitle { color: #b0bec5; margin-bottom: 30px; font-style: italic; }

        .upload-section {
            border: 2px dashed var(--primary);
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            background: rgba(255, 255, 255, 0.03);
            transition: 0.3s;
        }

        .upload-section:hover { background: rgba(0, 210, 255, 0.08); }

        .btn-group { 
            display: flex; 
            gap: 15px; 
            justify-content: center; 
            flex-wrap: wrap; 
            margin-bottom: 20px;
        }

        button {
            padding: 12px 28px;
            border: none;
            background: linear-gradient(45deg, #00d2ff, #3a7bd5);
            color: white;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 210, 255, 0.4);
            filter: brightness(1.1);
        }

        #status { 
            margin: 15px 0; 
            color: var(--primary); 
            font-weight: 600; 
            font-size: 0.9rem;
        }

        /* Results Area Graphics */
        .result-card {
            background: rgba(0, 0, 0, 0.4);
            padding: 30px;
            border-radius: 15px;
            margin-top: 25px;
            text-align: left;
            border-left: 5px solid var(--primary);
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .section-title {
            color: var(--primary);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 8px;
            margin-top: 25px;
            font-size: 1.2rem;
        }

        footer { margin-top: 50px; opacity: 0.5; font-size: 0.8rem; letter-spacing: 1px; }

        /* Custom Scrollbar for the glass effect */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }

    </style>
</head>
<body>

<div class="container">
    <h1>RE-SEARCH AI</h1>
    <p class="subtitle">Advanced Research Gap & Synthesis Engine</p>

    <div class="upload-section">
        <input type="file" id="pdfFiles" multiple accept=".pdf">
        <p style="font-size: 0.85rem; margin-top: 10px; color: #90a4ae;">
            Drag & drop or select multiple PDF research papers
        </p>
    </div>

    <div class="btn-group">
        <button onclick="processFiles('single')">Deep Analyze (1st Paper)</button>
        <button onclick="processFiles('compare')">Compare Papers</button>
        <button onclick="processFiles('gap')">Identify Research Gaps</button>
    </div>

    <p id="status">System Standby</p>

    <div id="displayArea"></div>

    <footer>DEVELOPED BY UTTAM WOLI SHARMA</footer>
</div>

<script src="script.js"></script>

</body>
</html>
